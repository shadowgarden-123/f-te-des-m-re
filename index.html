<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Voyage dans la Galaxie - Bonne Fête Maman</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="assets/photos.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #020208; font-family: 'Georgia', serif; color: #fff; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #camera-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 160px; height: 160px; border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            overflow: hidden; z-index: 10; background: #000;
        }
        #webcam {
            width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);
            filter: brightness(1.1) contrast(1.1); opacity: 0.8;
        }
        
        .floating-poem {
            position: absolute; text-align: center;
            top: 0; left: 0;
            font-size: 1.5rem; font-style: italic;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.4);
            color: #fff8e1; z-index: 5; pointer-events: none;
            opacity: 0; transition: opacity 0.3s;
            white-space: nowrap;
            will-change: transform, opacity; /* Accélération matérielle GPU */
        }
        
        #timer-indicator {
            position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
            z-index: 5; font-size: 0.9rem; letter-spacing: 3px;
            color: rgba(255, 215, 0, 0.8); text-transform: uppercase;
        }
        #progress-bar-container {
            width: 250px; height: 3px; background: rgba(255, 255, 255, 0.1);
            margin: 12px auto 0; border-radius: 3px; overflow: hidden;
        }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ffd700, #ffaa00); box-shadow: 0 0 15px gold; }

        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #ffffff 0%, #ffdf00 40%, #000000 100%);
            z-index: 99; opacity: 0; pointer-events: none; mix-blend-mode: screen;
        }

        #final-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0a0822 0%, #010103 100%);
            z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; padding: 30px;
        }
        #final-poem {
            max-width: 700px; font-size: 1.5rem; line-height: 1.9;
            text-align: center; margin-bottom: 50px; color: #fff8e1;
            text-shadow: 0 0 15px rgba(255,215,0,0.3); min-height: 250px; white-space: pre-line;
        }
        #media-container { opacity: 0; transform: translateY(20px); transition: all 1s ease 0.5s; text-align: center; }
        .gift-player { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 20px; padding: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); backdrop-filter: blur(10px); width: 450px; }
        .gift-player h3 { font-size: 1.2rem; color: #ffd700; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        audio { width: 100%; outline: none; filter: invert(1) hue-rotate(180deg); opacity: 0.9; }

        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #08071a 0%, #020208 100%);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #intro-overlay h1 { margin-bottom: 40px; color: #ffd700; font-weight: 300; text-align: center; padding: 0 20px; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255,215,0,0.4); }
        .start-btn {
            background: rgba(255,215,0,0.05); border: 1px solid #ffd700; color: #ffd700; padding: 18px 50px; font-size: 1.3rem; border-radius: 40px; cursor: pointer; box-shadow: 0 0 20px rgba(255,215,0,0.2); transition: all 0.4s; letter-spacing: 2px; text-transform: uppercase;
        }
        .start-btn:hover { background: #ffd700; color: #020208; box-shadow: 0 0 40px rgba(255,215,0,0.6); transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <h1>Un voyage au cœur de mon amour pour toi...</h1>
        <button class="start-btn" onclick="startExperience()">Commencer le voyage</button>
    </div>

    <div id="canvas-container"></div>
    <div id="camera-container"><video id="webcam" autoplay playsinline muted></video></div>
    <div id="timer-indicator">Vitesse Lumière activée...<div id="progress-bar-container"><div id="progress-bar"></div></div></div>
    <div id="flash"></div>

    <div id="final-screen">
        <div id="final-poem"></div>
        <div id="media-container" class="gift-player">
            <h3>Écoute mon message ❤️</h3>
            <audio id="final-audio" src="assets/audio/WhatsApp%20Audio%202026-05-30%20at%2022.24.43.aac" controls controlsList="nodownload"></audio>
        </div>
    </div>
    
    <!-- Musique de fond globale -->
    <audio id="bg-music" src="assets/audio/musique.mp3" loop></audio>

    <script>
        const poems = [
            "Maman, tu es l'étoile qui éclaire mes nuits...",
            "Dans cette immensité, mon amour pour toi est infini.",
            "Ta tendresse est une force qui me protège toujours.",
            "Chaque photo est un fragment de notre bonheur.",
            "Tu es le soleil autour duquel ma vie gravite.",
            "Ta bienveillance illumine ce monde.",
            "Merci d'être cette maman exceptionnelle.",
            "Ce voyage n'est qu'un aperçu de mon amour.",
            "Je t'aime jusqu'aux confins de la galaxie."
        ];

        const finalPoemText = `À ma maman chérie,

Dans le ciel de ma vie, tu es la plus belle des lumières.
Ce petit voyage dans les étoiles n'est rien à côté de l'amour que je te porte.
Tu as la force de la Terre, la douceur des nébuleuses et la bienveillance du soleil.

Merci pour chaque sacrifice, chaque sourire et chaque câlin.
Aujourd'hui, c'est ta fête, mais tu mérites d'être célébrée à chaque seconde.

Bonne Fête des Mères ! ❤️`;

        const explorationDuration = 60; // 60 secondes de voyage
        const travelDistance = 3000;
        const cameraStartZ = 400;
        const cameraEndZ = cameraStartZ - travelDistance;
        
        let scene, camera, renderer, stars, planets = [], poemElements = [];
        let heartConstellation;
        let audioCtx, keyboardSoundBuffer;
        
        let isShaking = false;
        let shakeIntensity = 0;
        let globalTime = 0;

        function startExperience() {
            gsap.to('#intro-overlay', { opacity: 0, duration: 1, onComplete: () => {
                document.getElementById('intro-overlay').style.display = 'none';
            }});
            
            initAudio();
            initCamera();
            init3D();
            startTimeline();
        }

        function initCamera() {
            const video = document.getElementById('webcam');
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
                .then(stream => { video.srcObject = stream; }).catch(err => {});
            }
        }

        function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            if(audioCtx.state === 'suspended') audioCtx.resume();

            // Démarrage de la vraie musique de fond
            const bgMusic = document.getElementById('bg-music');
            bgMusic.volume = 1.0; // Volume à fond (100%)
            bgMusic.play().catch(e => console.log("La lecture auto de la musique a été bloquée."));

            keyboardSoundBuffer = createKeyboardSoundBuffer();
        }

        function createKeyboardSoundBuffer() {
            const bufferSize = audioCtx.sampleRate * 0.08;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.2)) * 0.15;
            }
            return buffer;
        }

        function playKeyboardClick() {
            if(!audioCtx || !keyboardSoundBuffer) return;
            let source = audioCtx.createBufferSource();
            source.buffer = keyboardSoundBuffer;
            let lowpass = audioCtx.createBiquadFilter();
            lowpass.type = 'lowpass'; lowpass.frequency.value = 800 + Math.random() * 400;
            source.connect(lowpass); lowpass.connect(audioCtx.destination);
            source.start();
        }

        function init3D() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020208, 0.0008); // Brouillard léger pour voir loin

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.z = cameraStartZ;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            // 1. Génération de la Voie Lactée (Tunnel Infini)
            const starGeo = new THREE.BufferGeometry();
            const starCount = 4000; // Réduit à 4000 pour la fluidité absolue (60fps)
            const starPositions = new Float32Array(starCount * 3);
            for(let i=0; i<starCount; i++) {
                // Création d'une spirale tubulaire
                const z = cameraStartZ + 100 - Math.random() * (travelDistance + 1000);
                const angle = z * 0.01 + Math.random() * Math.PI * 2;
                const radius = 30 + Math.random() * 400;
                
                starPositions[i*3] = Math.cos(angle) * radius;
                starPositions[i*3+1] = Math.sin(angle) * radius;
                starPositions[i*3+2] = z;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            let starMaterial = new THREE.PointsMaterial({ color: 0xffeebb, size: 1.5, transparent: true, opacity: 0.8 });
            stars = new THREE.Points(starGeo, starMaterial);
            scene.add(stars);

            // 2. Les Photos (Panneaux Holographiques Plats non déformés)
            const photoFiles = [photoData1, photoData2, photoData3];
            const textureLoader = new THREE.TextureLoader();
            
            // Placement des photos tout au long du voyage (Axe Z)
            const photoZPositions = [cameraStartZ - 400, cameraStartZ - 1200, cameraStartZ - 2000];
            const photoXPositions = [-50, 40, -30];
            const photoYPositions = [10, -20, 20];

            for(let i = 0; i < 3; i++) {
                // Ratio classique (Ex: 32x24) pour ne pas déformer
                let geom = new THREE.PlaneGeometry(40, 30);
                textureLoader.load(photoFiles[i], function(texture) {
                    // Calcul du vrai ratio de l'image
                    const imageRatio = texture.image.width / texture.image.height;
                    geom = new THREE.PlaneGeometry(30 * imageRatio, 30);
                    
                    let planetMaterial = new THREE.MeshBasicMaterial({ 
                        map: texture, 
                        side: THREE.DoubleSide,
                        transparent: true
                    });
                    
                    let mesh = new THREE.Mesh(geom, planetMaterial);
                    mesh.position.set(photoXPositions[i], photoYPositions[i], photoZPositions[i]);
                    planets.push(mesh);
                    scene.add(mesh);
                    
                    // Cadre doré autour de la photo
                    let edges = new THREE.EdgesGeometry(geom);
                    let line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffd700, linewidth: 2, transparent: true, opacity: 0.6 }));
                    mesh.add(line);
                });
            }

            // 3. Constellation Cœur tout au bout du tunnel
            initHeartConstellation();

            // 4. Poèmes 3D Volants
            initFloatingPoems();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function initHeartConstellation() {
            const points = [];
            for (let i = 0; i <= 40; i++) {
                const t = (i / 40) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                points.push(new THREE.Vector3(x * 10, y * 10, cameraEndZ - 200)); // Cœur géant à l'arrivée
            }
            const mat = new THREE.LineBasicMaterial({ color: 0xffaaaa, transparent: true, opacity: 0.5, linewidth: 2 });
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            heartConstellation = new THREE.Line(geo, mat);
            scene.add(heartConstellation);
        }

        function initFloatingPoems() {
            poems.forEach((text, i) => {
                let el = document.createElement('div');
                el.className = 'floating-poem';
                el.innerText = text;
                document.body.appendChild(el);
                
                // Disperser les poèmes sur l'axe Z
                let zPos = cameraStartZ - 200 - (i * (travelDistance / poems.length));
                let xPos = (Math.random() - 0.5) * 100;
                let yPos = (Math.random() - 0.5) * 80;
                
                poemElements.push({ el: el, pos: new THREE.Vector3(xPos, yPos, zPos) });
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            globalTime += 0.02;

            // Rotation douce de la galaxie
            stars.rotation.z += 0.0005;

            // Avancée continue de la caméra dans la galaxie
            if (!isShaking && camera.position.z > cameraEndZ) {
                // Vitesse = Distance totale / Frames (60fps * 60s = 3600 frames)
                camera.position.z -= (travelDistance / (explorationDuration * 60));
            }

            // Mise à jour des Photos Plates (Toujours face caméra pour être nettes)
            planets.forEach((mesh, index) => {
                mesh.lookAt(camera.position);
                // Léger balancement vertical pour le style
                mesh.position.y += Math.sin(globalTime * 2 + index) * 0.05;
            });

            // Mise à jour des poèmes 3D en éléments DOM (Hyper Optimisé)
            poemElements.forEach(poem => {
                let dist = poem.pos.z - camera.position.z;
                
                if (dist > 20 || dist < -500) {
                    poem.el.style.opacity = 0;
                } else {
                    let vector = poem.pos.clone().project(camera);
                    let x = (vector.x * .5 + .5) * window.innerWidth;
                    let y = -(vector.y * .5 - .5) * window.innerHeight;
                    
                    // Effet de zoom quand ça se rapproche
                    let scale = 1 + (200 + dist) / 1000;
                    // On utilise uniquement transform (translate3d) pour éviter les lags processeur
                    poem.el.style.transform = `translate3d(${x}px, ${y}px, 0) translate(-50%, -50%) scale(${scale})`;
                    
                    // Fondu en fonction de la distance
                    let opacity = 1 - Math.abs(dist + 200) / 300;
                    poem.el.style.opacity = Math.max(0, Math.min(1, opacity));
                }
            });

            if (isShaking) {
                camera.position.x = (Math.random() - 0.5) * shakeIntensity;
                camera.position.y = (Math.random() - 0.5) * shakeIntensity;
                const camContainer = document.getElementById('camera-container');
                camContainer.style.transform = `translate(-50%, -50%) translate(${(Math.random() - 0.5) * shakeIntensity * 0.2}px, ${(Math.random() - 0.5) * shakeIntensity * 0.2}px) scale(${camContainer.style.scale || 1})`;
            }

            renderer.render(scene, camera);
        }

        // --- TIMELINE ET FINAL ---
        function startTimeline() {
            const progressBar = document.getElementById('progress-bar');
            gsap.to(progressBar, {
                width: '100%',
                duration: explorationDuration,
                ease: 'none',
                onComplete: triggerSupernova
            });
        }

        function triggerSupernova() {
            gsap.to(['.floating-poem', '#timer-indicator'], { opacity: 0, duration: 0.5 });

            isShaking = true;
            shakeIntensity = 2;
            gsap.to(window, { shakeIntensity: 20, duration: 2.8, ease: 'power2.in' }); 

            // Les photos convergent vers la caméra à la vitesse de la lumière
            planets.forEach(mesh => {
                gsap.to(mesh.position, { 
                    x: camera.position.x, y: camera.position.y, z: camera.position.z - 50, 
                    duration: 2.8, ease: 'power3.in' 
                });
                gsap.to(mesh.scale, { x: 0.01, y: 0.01, z: 0.01, duration: 2.8 });
            });
            
            const camContainer = document.getElementById('camera-container');
            camContainer.style.scale = 1;
            
            gsap.to(camContainer.style, { scale: 0.1, duration: 2.8, ease: 'power3.in', onComplete: () => {
                
                const flash = document.getElementById('flash');
                gsap.to(flash, { opacity: 1, duration: 0.2, onComplete: () => {
                    
                    isShaking = false;
                    document.getElementById('canvas-container').style.display = 'none';
                    document.getElementById('camera-container').style.display = 'none';
                    
                    // Diminuer doucement la musique de fond
                    const bgMusic = document.getElementById('bg-music');
                    gsap.to(bgMusic, { volume: 0.05, duration: 3 });

                    document.getElementById('final-screen').style.pointerEvents = 'auto';
                    gsap.to('#final-screen', { opacity: 1, duration: 0 });
                    
                    gsap.to(flash, { opacity: 0, duration: 3.5, delay: 0.3 });
                    
                    setTimeout(startTypewriter, 2000);
                }});
            }});
        }

        function startTypewriter() {
            const poemContainer = document.getElementById('final-poem');
            let i = 0;
            function typeChar() {
                if (i < finalPoemText.length) {
                    poemContainer.innerHTML += finalPoemText.charAt(i);
                    if(finalPoemText.charAt(i) !== ' ' && finalPoemText.charAt(i) !== '\n') playKeyboardClick();
                    i++;
                    setTimeout(typeChar, 35 + Math.random() * 30); 
                } else {
                    gsap.to('#media-container', { opacity: 1, y: 0, duration: 1.5 });
                }
            }
            typeChar();
        }
    </script>
</body>
</html>
